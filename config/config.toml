# config/config.toml.example
# Copy to config/config.toml and edit

[gateway]
default_runner = "claude"
session_idle_minutes = 60
max_message_length_telegram = 4096
max_message_length_discord = 2000
stream_edit_interval_seconds = 0.5

[gateway.rate_limit]
daily_token_budget = 0    # 0 = 無限制；建議個人使用設 200000（約 $1/day for Sonnet）
weekly_token_budget = 0   # 0 = 無限制
warn_threshold = 0.8      # 達到此比例時發出警告
hard_stop_at_limit = false  # true=拒絕新 dispatch；false=允許但附加警告訊息

[runners.claude]
type = "acp"
path = "claude-agent-acp"
args = []
timeout_seconds = 300
context_token_budget = 4000

[runners.codex]
type = "acp"
path = "codex-acp"
args = []
timeout_seconds = 300
context_token_budget = 4000

[runners.gemini]
type = "acp"
path = "gemini"
args = ["--acp", "--yolo"]
timeout_seconds = 300
context_token_budget = 4000

[agent_team]
max_depth = 2
fallback_role = "fullstack-dev"

[dispatch]
max_pipeline_rounds = 4
max_discussion_rounds = 3
max_debate_voters = 5
enforce_token_budget = true

[audit]
path = "data/audit"
max_entries = 1000

[memory]
db_path = "data/db/history.db"
hot_path = "data/memory/hot"
cold_permanent_path = "data/memory/cold/permanent"
cold_session_path = "data/memory/cold/session"
tier3_context_turns = 20
distill_trigger_turns = 20
